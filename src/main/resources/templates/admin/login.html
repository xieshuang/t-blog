<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <link rel="shortcut icon" th:href="@{/admin/images/favicon.png}"/>
    <title>管理后台 - 河岸飞流</title>
    <link th:href="@{https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.2/css/bootstrap.min.css}" rel="stylesheet"/>
    <link th:href="@{https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css}" rel="stylesheet"/>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 420px;
            width: 100%;
        }
        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            text-align: center;
            color: white;
        }
        .login-header h2 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }
        .login-header p {
            margin: 5px 0 0;
            opacity: 0.9;
            font-size: 14px;
        }
        .login-body {
            padding: 40px 35px;
        }
        .form-control {
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 15px;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            transition: all 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .input-group-text {
            background: transparent;
            border: 2px solid #e8e8e8;
            border-left: none;
            border-radius: 0 10px 10px 0;
        }
        .form-control:focus + .input-group-text {
            border-color: #667eea;
        }
        .remember-me {
            color: #666;
            font-size: 14px;
        }
        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #999;
        }
        .footer-link a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h2><i class="fas fa-blog me-2"></i>河岸飞流</h2>
            <p>博客管理系统</p>
        </div>
        <div class="login-body">
            <form method="post" id="loginForm" onsubmit="return checkForm()">
                <div class="mb-4">
                    <div class="input-group">
                        <input type="text" class="form-control" name="username" placeholder="用户名" required/>
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                    </div>
                </div>
                <div class="mb-4">
                    <div class="input-group">
                        <input type="password" class="form-control" name="password" placeholder="密码" required/>
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    </div>
                </div>
                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" id="remember" name="remeber_me"/>
                    <label class="form-check-label remember-me" for="remember">记住登录</label>
                </div>
                <button type="submit" class="btn btn-login w-100">
                    <i class="fas fa-sign-in-alt me-2"></i>登 录
                </button>
            </form>
            <div class="footer-link">
                <a th:href="@{/}"><i class="fas fa-home me-1"></i>返回首页</a>
            </div>
        </div>
    </div>

    <script th:src="@{https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js}"></script>
    <script th:src="@{https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.0/sweetalert2.all.min.js}"></script>
    <script th:src="@{/admin/js/base.js}"></script>
    <script type="text/javascript">
        function checkForm() {
            var username = $("input[name='username']").val();
            var password = $("input[name='password']").val();
            var remeber_me = $("input[name='remeber_me']").is(':checked');
            
            $.post('/admin/login', {
                username: username,
                password: password,
                remeber_me: remeber_me
            }, function(result) {
                if (result && result.success) {
                    window.location.href = '/admin/index';
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: '登录失败',
                        text: result.msg || '用户名或密码错误'
                    });
                }
            }).fail(function() {
                Swal.fire({
                    icon: 'error',
                    title: '登录失败',
                    text: '网络错误'
                });
            });
            return false;
        }
    </script>
</body>
</html>
